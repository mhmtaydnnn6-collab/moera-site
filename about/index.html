<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Moera</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            overflow-y: scroll;
            /* Scrollbar'ı gizlemek için eklemeler */
            -ms-overflow-style: none;  /* IE ve Edge için */
            scrollbar-width: none;     /* Firefox için */
            /* Sert geçişler için scroll snap */
            scroll-snap-type: y mandatory;
        }

        /* Chrome, Safari ve Opera için scrollbar'ı gizle */
        body::-webkit-scrollbar {
            display: none;
        }

        /* Sabit Header */
        .header-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }

        .header-container img {
            width: 100%;
            display: block;
        }

        /* İçerik Bölümleri */
        .section {
            width: 100%;
            min-height: 100vh;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Siyah alanlar */
        .black-bg { background-color: #000; }

        /* Görsel alanlar */
        .image-bg {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .photo1 { background-image: url('foto1.jpg'); }
        .photo2 { background-image: url('foto2.jpg'); }
    </style>
</head>
<body>

    <div class="header-container">
        <img src="header.png" alt="Header">
    </div>

    <div class="section black-bg"></div>

    <div class="section image-bg photo1"></div>

    <div class="section black-bg"></div>

    <div class="section image-bg photo2"></div>

    <div class="section black-bg"></div>

</body>
</html>
