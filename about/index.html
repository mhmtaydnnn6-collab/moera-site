<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Moera</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: #fff; overflow-x: hidden; }

        /* Sabit Header Görseli */
        .header-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 80px;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
            border-bottom: 1px solid #222;
        }

        .header-container img {
            max-height: 50px; /* Görseli header içine sığdırıyoruz */
            object-fit: contain;
        }

        /* İçerik Bölgesi (Header'ın altına kaymaması için boşluk) */
        main { margin-top: 80px; }

        .section {
            width: 100%; min-height: 100vh;
            background-color: #000;
        }
    </style>
</head>
<body>

    <header class="header-container">
        <img src="header.png" alt="Moera Header">
    </header>

    <main>
        <div class="section">
            </div>
    </main>

</body>
</html>
