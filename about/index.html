<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Moera</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            overflow-y: scroll;
            /* Scrollbar gizleme */
            -ms-overflow-style: none;  
            scrollbar-width: none;     
            scroll-snap-type: y mandatory;
        }

        /* Tarayıcı scrollbar gizleme */
        body::-webkit-scrollbar { display: none; }

        /* Sabit Header */
        .header-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }

        .header-container img { width: 100%; display: block; }

        /* Bölüm ayarları */
        .section {
            width: 100%;
            min-height: 100vh;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .black-bg { background-color: #000; }

        /* Fotoğraf ayarları */
        .photo-bg {
            background-image: url('moeraarka.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #000;
        }

        /* Mobil için görseli koruma */
        @media (max-width: 768px) {
            .photo-bg {
                background-size: contain; 
            }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <img src="header.png" alt="Header">
    </div>

    <div class="section black-bg">&nbsp;</div>

    <div class="section photo-bg">&nbsp;</div>

    <div class="section black-bg">&nbsp;</div>

</body>
</html>
