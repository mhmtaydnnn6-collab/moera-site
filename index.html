<!DOCTYPE html>
<html lang="tr">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-P57TV9S7NT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-P57TV9S7NT');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moera</title>
    <link rel="icon" type="image/png" href="favicon.png?v=1">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background-color: #000; 
            font-family: 'Lato', sans-serif;
        }

        .background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('post.png'); 
            background-position: center center;
            background-repeat: no-repeat;
            background-size: cover;
            z-index: 1;
        }

        @media (max-width: 768px) {
            .background {
                background-image: url('mobile.png') !important;
            }
        }

        .header-content {
            position: fixed; left: 0; width: 100%; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            top: 0; padding-top: 40px;
        }

        @media (max-width: 768px) {
            .header-content {
                top: 50%; transform: translateY(-50%); padding-top: 0;
            }
        }

        .footer-content {
            position: fixed; bottom: 0; left: 0; width: 100%; z-index: 10;
            padding-bottom: 30px; display: flex; flex-direction: column; align-items: center;
        }

        #countdown {
            display: flex; gap: 10px; color: white; text-align: center;
        }

        .countdown-item {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px; min-width: 65px; border-radius: 4px;
            backdrop-filter: blur(4px);
        }

        .countdown-number {
            display: block; font-size: 24px; font-weight: 700; letter-spacing: 1px;
        }

        .countdown-label {
            display: block; font-size: 10px; text-transform: uppercase;
            opacity: 0.8; margin-top: 3px; font-weight: 500;
        }

        .links-container { width: 85%; max-width: 320px; display: flex; flex-direction: column; gap: 10px; }

        .link-card {
            background: rgba(0, 0, 0, 0.7); border: 1.5px solid #fff; 
            padding: 14px; border-radius: 4px; text-decoration: none; 
            color: #fff; font-weight: 500; text-align: center; 
            text-transform: uppercase; letter-spacing: 2px;
            font-size: 13px; transition: 0.3s;
        }

        .link-card:hover { background: white; color: black; }

        .notification-btn {
            position: fixed; bottom: 30px; left: 30px;
            width: 50px; height: 50px; background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s ease; backdrop-filter: blur(5px); z-index: 1000;
        }

        .social-icons {
            position: fixed; bottom: 30px; right: 30px;
            display: flex; flex-direction: column; gap: 15px; z-index: 1000;
        }
        .social-icon-btn {
            width: 50px; height: 50px; background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s ease; backdrop-filter: blur(5px);
        }

        .notification-btn:hover, .social-icon-btn:hover {
            background-color: rgba(255, 255, 255, 0.2); transform: scale(1.1); border-color: rgba(255, 255, 255, 0.8);
        }

        @media (max-width: 768px) {
            /* Bildirim butonu SOL ÜSTE alındı */
            .notification-btn { top: 20px; left: 20px; bottom: auto; right: auto; width: 45px; height: 45px; }
            /* Sosyal ikonlar SAĞ ALT'ta kaldı */
            .social-icons { bottom: 20px; right: 20px; gap: 10px; }
            .social-icon-btn { width: 45px; height: 45px; }
            #countdown { gap: 8px; }
            .countdown-item { min-width: 55px; padding: 8px; }
            .countdown-number { font-size: 18px; }
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <a href="/notification" class="notification-btn" title="Bildirimler">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
    </a>

    <div class="social-icons">
        <a href="https://instagram.com/moerahome" class="social-icon-btn" target="_blank">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
        </a>
        <a href="https://wa.me/905XXXXXXXXX" class="social-icon-btn" target="_blank">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
        </a>
    </div>

    <div class="header-content">
        <div id="countdown">
            <div class="countdown-item"><span class="countdown-number" id="days">00</span><span class="countdown-label">GÜN</span></div>
            <div class="countdown-item"><span class="countdown-number" id="hours">00</span><span class="countdown-label">SAAT</span></div>
            <div class="countdown-item"><span class="countdown-number" id="minutes">00</span><span class="countdown-label">DK</span></div>
            <div class="countdown-item"><span class="countdown-number" id="seconds">00</span><span class="countdown-label">SN</span></div>
        </div>
    </div>

    <div class="footer-content">
        <div class="links-container">
            <a href="/about" class="link-card">ABOUT US</a>
        </div>
    </div>

    <script>
        const countdownDate = new Date("March 27, 2026 00:00:00").getTime();
        function updateCountdown() {
            const now = new Date().getTime();
            const distance = countdownDate - now;
            if (distance < 0) { document.getElementById("countdown").innerHTML = "<p style='color:white; font-weight:700;'>MOERA AÇILDI!</p>"; return; }
            document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById("minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById("seconds").innerText = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
