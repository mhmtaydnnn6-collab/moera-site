<!DOCTYPE html>
<html lang="tr">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-P57TV9S7NT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-P57TV9S7NT');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Moera</title>
    <link rel="icon" type="image/png" href="favicon.png?v=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Lato:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Lato', sans-serif;
        }

        /* ── ARKA PLAN ── */
        .bg {
            position: fixed;
            inset: 0;
            background-image: url('post.png');
            background-size: cover;
            background-position: center;
            z-index: 0;
            transition: opacity 1.2s ease;
        }

        .bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0) 45%),
                linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 30%);
        }

        @media (max-width: 768px) {
            .bg { background-image: url('mobile.png'); background-position: top center; }
        }

        /* ── ÜST LOGO ── */
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 20;
            padding: 32px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: 22px;
            letter-spacing: 10px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.9);
            text-decoration: none;
        }

        .top-date {
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            font-weight: 300;
        }

        /* ── ORTA — SAYAÇ ── */
        .center-block {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 10;
            padding: 0 40px calc(100px + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 28px;
        }

        .pre-label {
            font-size: 10px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.45);
            font-weight: 300;
        }

        /* Sayaç — yatay, büyük rakamlar */
        #countdown {
            display: flex;
            align-items: flex-end;
            gap: 0;
            color: white;
        }

        .countdown-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 28px 0 0;
            margin-right: 28px;
            border-right: 1px solid rgba(255,255,255,0.12);
        }

        .countdown-item:last-child {
            border-right: none;
            margin-right: 0;
            padding-right: 0;
        }

        .countdown-number {
            font-family: 'Lato', sans-serif;
            font-weight: 500;
            font-size: clamp(52px, 7vw, 96px);
            line-height: 1;
            letter-spacing: -1px;
            display: block;
        }

        .countdown-label {
            font-size: 9px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.35);
            font-weight: 300;
            margin-top: 8px;
            display: block;
        }

        /* ── ALT BUTONLAR ── */
        .bottom-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 20;
            padding: 0 40px calc(36px + env(safe-area-inset-bottom));
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Sol: Bildirim */
        .icon-btn {
            width: 44px;
            height: 44px;
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            background: rgba(0,0,0,0.2);
        }

        .icon-btn:hover {
            border-color: rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.08);
        }

        /* Orta: About Us */
        .about-btn {
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            padding: 13px 36px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.35s ease;
            font-weight: 300;
            letter-spacing: 4px;
        }

        .about-btn:hover {
            border-color: rgba(255,255,255,0.55);
            color: #fff;
            background: rgba(255,255,255,0.07);
        }

        /* Sağ: Sosyal ikonlar */
        .social-group {
            display: flex;
            gap: 10px;
        }

        /* ── ANİMASYONLAR ── */
        .anim-1 { opacity: 0; animation: riseUp 1.2s cubic-bezier(0.22,1,0.36,1) 0.1s forwards; }
        .anim-2 { opacity: 0; animation: riseUp 1.2s cubic-bezier(0.22,1,0.36,1) 0.35s forwards; }
        .anim-3 { opacity: 0; animation: riseUp 1.2s cubic-bezier(0.22,1,0.36,1) 0.55s forwards; }
        .anim-4 { opacity: 0; animation: riseUp 1.2s cubic-bezier(0.22,1,0.36,1) 0.75s forwards; }

        @keyframes riseUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .bg-anim {
            opacity: 0;
            animation: bgFade 2s ease forwards;
        }

        @keyframes bgFade {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        /* ── MOBİL ── */
        @media (max-width: 768px) {
            .top-bar {
                padding: calc(env(safe-area-inset-top) + 20px) 24px 20px;
            }
            .logo { font-size: 17px; letter-spacing: 6px; }
            .top-date { display: none; }

            .center-block {
                padding: 0 24px calc(88px + env(safe-area-inset-bottom));
                gap: 16px;
            }

            .pre-label { font-size: 9px; letter-spacing: 4px; }

            #countdown { gap: 0; }

            .countdown-item {
                padding-right: 16px;
                margin-right: 16px;
            }

            .countdown-number { font-size: clamp(36px, 9vw, 56px); letter-spacing: -0.5px; }
            .countdown-label { font-size: 8px; margin-top: 5px; letter-spacing: 2px; }

            .bottom-bar {
                padding: 0 20px calc(24px + env(safe-area-inset-bottom));
            }

            .about-btn {
                font-size: 9px;
                letter-spacing: 3px;
                padding: 11px 22px;
            }

            .icon-btn { width: 40px; height: 40px; }
        }

        @media (max-width: 390px) {
            .countdown-item { padding-right: 12px; margin-right: 12px; }
            .countdown-number { font-size: 32px; }
            .bottom-bar { padding: 0 16px calc(22px + env(safe-area-inset-bottom)); }
        }

        @media (max-width: 320px) {
            .countdown-number { font-size: 27px; }
            .countdown-item { padding-right: 10px; margin-right: 10px; }
            .about-btn { padding: 10px 16px; font-size: 8px; }
        }
    </style>
</head>
<body>

    <!-- ARKA PLAN -->
    <div class="bg bg-anim"></div>

    <!-- ÜST BAR -->
    <div class="top-bar anim-1">
        <span class="logo">Moera</span>
        <span class="top-date">14 . 04 . 2026</span>
    </div>

    <!-- SAYAÇ — Sol alt -->
    <div class="center-block anim-2">
        <p class="pre-label">Açılışa kalan süre</p>
        <div id="countdown">
            <div class="countdown-item">
                <span class="countdown-number" id="days">00</span>
                <span class="countdown-label">Gün</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="hours">00</span>
                <span class="countdown-label">Saat</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="minutes">00</span>
                <span class="countdown-label">Dakika</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="seconds">00</span>
                <span class="countdown-label">Saniye</span>
            </div>
        </div>
    </div>

    <!-- ALT BAR -->
    <div class="bottom-bar anim-3">

        <!-- Sol: Bildirim -->
        <a href="https://moerahome.com/notification/" class="icon-btn" title="Bildirimler">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
        </a>

        <!-- Orta: About Us -->
        <a href="https://moerahome.com/about/" class="about-btn">About Us</a>

        <!-- Sağ: Sosyal -->
        <div class="social-group anim-4">
            <a href="https://instagram.com/moerahome" class="icon-btn" target="_blank" title="Instagram">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                    <circle cx="12" cy="12" r="4"/>
                    <circle cx="17.5" cy="6.5" r="0.5" fill="rgba(255,255,255,0.75)" stroke="none"/>
                </svg>
            </a>
            <a href="https://wa.me/905418892202" class="icon-btn" target="_blank" title="WhatsApp">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                </svg>
            </a>
        </div>

    </div>

    <script>
        const countdownDate = new Date("April 14, 2026 00:00:00").getTime();

        function updateCountdown() {
            const now      = new Date().getTime();
            const distance = countdownDate - now;

            if (distance < 0) {
                document.getElementById("countdown").innerHTML =
                    "<p style='font-family:Cormorant Garamond,serif;font-weight:300;font-size:clamp(32px,5vw,64px);letter-spacing:6px;color:white;text-transform:uppercase;'>Moera</p>";
                return;
            }

            const d = Math.floor(distance / 86400000);
            const h = Math.floor((distance % 86400000) / 3600000);
            const m = Math.floor((distance % 3600000) / 60000);
            const s = Math.floor((distance % 60000) / 1000);

            document.getElementById("days").innerText    = String(d).padStart(2, '0');
            document.getElementById("hours").innerText   = String(h).padStart(2, '0');
            document.getElementById("minutes").innerText = String(m).padStart(2, '0');
            document.getElementById("seconds").innerText = String(s).padStart(2, '0');
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>

</body>
</html>
