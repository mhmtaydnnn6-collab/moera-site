<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moera</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Mobil odaklı ana yapı */
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            height: 100dvh; /* Mobil tarayıcı çubukları için gerçek yükseklik */
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* İçeriği en alta yasla */
            align-items: center;
            font-family: Arial, sans-serif;
            
            /* Arka Plan Ayarları */
            background-image: url('post.png');
            background-repeat: no-repeat;
            background-position: center center; /* Resmi ortala */
            background-size: cover; /* Resmi ekrana sığdır */
            background-attachment: scroll; /* Mobilde patlamaması için en kritik ayar */
        }

        /* Masaüstü (Bilgisayar) için ufak bir dokunuş */
        @media (min-width: 769px) {
            body {
                background-attachment: fixed; /* Bilgisayarda o havalı sabit duruş kalsın */
            }
        }

        /* Buton Kapsayıcısı */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 85%;
            max-width: 350px;
            /* Mobilde '2026' yazısından uzak durması için alt boşluk */
            margin-bottom: 50px; 
            z-index: 10;
        }

        /* Buton Tasarımı */
        .link-card {
            background: rgba(0, 0, 0, 0.8); /* Daha okunabilir siyah arka plan */
            border: 1.5px solid white;
            padding: 15px;
            border-radius: 5px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 14px;
            transition: 0.3s ease;
        }

        .link-card:hover {
            background: white;
            color: black;
        }
    </style>
</head>
<body>

    <div class="links-container">
        <a href="https://instagram.com/moerahome" class="link-card" target="_blank">INSTAGRAM</a>
        <a href="mailto:iletisim@moera.com" class="link-card">CONTACT US</a>
    </div>

</body>
</html>
