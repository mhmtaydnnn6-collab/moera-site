<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moera</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden; /* Ekranın sağa sola veya gereksiz aşağı kaymasını engeller */
        }

        body {
            /* Arka plan ayarları */
            background: url('post.png') no-repeat center center;
            background-size: cover;
            /* Masaüstü için sabit tutalım */
            background-attachment: fixed;
            
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Butonları alta yaslar */
            align-items: center;
            font-family: Arial, sans-serif;
            height: 100vh;
            height: 100dvh;
        }

        /* MOBİL ÖZEL AYAR (En kritik yer burası) */
        @media (max-width: 768px) {
            body {
                /* iPhone/Android için fixed özelliğini kapatıyoruz, yoksa resim zoom yapar */
                background-attachment: scroll !important;
                /* Resmi mobilde biraz daha yukarıdan başlat ki 2026 yazısı yukarı çıksın */
                background-position: center 15%; 
            }

            .links-container {
                /* Mobilde butonları en alttan biraz daha yukarı alıyoruz */
                margin-bottom: 40px !important; 
            }
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 85%;
            max-width: 320px;
            /* Butonların o 2026 yazısının üstüne binmemesi için alt boşluk */
            margin-bottom: 60px; 
            z-index: 10;
        }

        .link-card {
            background: rgba(0, 0, 0, 0.8);
            border: 1.5px solid white;
            padding: 14px;
            border-radius: 4px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 13px;
            transition: 0.3s;
        }

        .link-card:hover {
            background: white;
            color: black;
        }
    </style>
</head>
<body>

    <div class="links-container">
        <a href="https://instagram.com/moerahome" class="link-card" target="_blank">INSTAGRAM</a>
        <a href="mailto:iletisim@moera.com" class="link-card">CONTACT US</a>
    </div>

</body>
</html>
