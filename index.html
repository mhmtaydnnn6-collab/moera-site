<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moera</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Görsel isminin post.png veya olduğundan emin ol */
            background: url('post.png') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Butonları aşağıya iter */
            align-items: center;
            font-family: Arial, sans-serif;
            padding-bottom: 10vh; /* Sayfanın en altına yapışmaması için boşluk */
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 90%;
            max-width: 350px;
        }

        .link-card {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid white;
            padding: 16px;
            border-radius: 5px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .link-card:hover {
            background: white;
            color: black;
        }
    </style>
</head>
<body>

    <div class="links-container">
        <a href="https://instagram.com/moerahome" class="link-card">INSTAGRAM</a>
        
        <a href="mailto:iletisim@moera.com" class="link-card">CONTACT US</a>
    </div>

</body>

</html>
