<!DOCTYPE html>
<html lang="tr">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-P57TV9S7NT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-P57TV9S7NT');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Moera</title>
    <link rel="icon" type="image/png" href="favicon.png?v=1">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background-color: #000; 
            font-family: 'Lato', sans-serif;
        }

        .background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('post.png'); 
            background-position: center center;
            background-repeat: no-repeat;
            background-size: cover;
            z-index: 1;
        }

        @media (max-width: 768px) {
            .background {
                background-image: url('mobile.png') !important;
                background-attachment: scroll !important;
            }
        }

        .header-content {
            position: fixed; left: 0; width: 100%; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            top: 0; padding-top: 40px;
        }

        @media (max-width: 768px) {
            .header-content {
                top: 50%; transform: translateY(-50%); padding-top: 0;
            }
        }

        .footer-content {
            position: fixed; bottom: 0; left: 0; width: 100%; z-index: 10;
            padding-bottom: 30px; display: flex; flex-direction: column; align-items: center;
        }

        #countdown {
            display: flex; gap: 10px; color: white; text-align: center;
        }

        .countdown-item {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px; min-width: 65px; border-radius: 4px;
            backdrop-filter: blur(4px);
        }

        .countdown-number {
            display: block; font-size: 24px; font-weight: 700; letter-spacing: 1px;
        }

        .countdown-label {
            display: block; font-size: 10px; text-transform: uppercase;
            opacity: 0.8; margin-top: 3px; font-weight: 500;
        }

        .links-container { width: 85%; max-width: 320px; display: flex; flex-direction: column; gap: 10px; }

        .link-card {
            background: rgba(0, 0, 0, 0.7); border: 1.5px solid #fff; 
            padding: 14px; border-radius: 4px; text-decoration: none; 
            color: #fff; font-weight: 500; text-align: center; 
            text-transform: uppercase; letter-spacing: 2px;
            font-size: 13px; transition: 0.3s;
        }

        .link-card:hover { background: white; color: black; }

        /* SOL ALT BİLDİRİM BUTONU */
        .notification-btn {
            position: fixed; 
            bottom: 30px; 
            left: 30px;
            width: 50px; 
            height: 50px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s ease;
            backdrop-filter: blur(5px); z-index: 1000;
            text-decoration: none;
        }

        .notification-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
            border-color: rgba(255, 255, 255, 0.8);
        }

        /* SAĞ ALT SOSYAL BUTONLAR */
        .social-buttons {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 1000;
        }

        .social-btn {
            width: 50px; 
            height: 50px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            text-decoration: none;
        }

        .social-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
            border-color: rgba(255, 255, 255, 0.8);
        }

        @media (max-width: 768px) {
            .notification-btn { 
                bottom: calc(20px + env(safe-area-inset-bottom));
                left: 20px;
                width: 44px; 
                height: 44px; 
            }
            .social-buttons {
                bottom: calc(20px + env(safe-area-inset-bottom));
                right: 20px;
                gap: 10px;
            }
            .social-btn {
                width: 44px;
                height: 44px;
            }
            #countdown { gap: 6px; }
            .countdown-item { min-width: 54px; padding: 8px 6px; }
            .countdown-number { font-size: 22px; }
            .countdown-label { font-size: 9px; }
            .footer-content { 
                padding-bottom: calc(20px + env(safe-area-inset-bottom));
            }
            .links-container { max-width: 280px; }
            .link-card { padding: 12px; font-size: 12px; letter-spacing: 1.5px; }
        }

        @media (max-width: 360px) {
            .countdown-item { min-width: 48px; padding: 7px 5px; }
            .countdown-number { font-size: 19px; }
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <!-- Sol alt: Bildirim butonu -->
    <a href="/notification" class="notification-btn" title="Bildirimler">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
    </a>

    <!-- Sağ alt: Instagram + WhatsApp butonları -->
    <div class="social-buttons">
        <a href="https://instagram.com/moerahome" class="social-btn" target="_blank" title="Instagram">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <circle cx="12" cy="12" r="4"></circle>
                <circle cx="17.5" cy="6.5" r="0.5" fill="white" stroke="none"></circle>
            </svg>
        </a>
        <a href="https://wa.me/905418892202" class="social-btn" target="_blank" title="WhatsApp">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
            </svg>
        </a>
    </div>

    <div class="header-content">
        <div id="countdown">
            <div class="countdown-item">
                <span class="countdown-number" id="days">00</span>
                <span class="countdown-label">GÜN</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="hours">00</span>
                <span class="countdown-label">SAAT</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="minutes">00</span>
                <span class="countdown-label">DK</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="seconds">00</span>
                <span class="countdown-label">SN</span>
            </div>
        </div>
    </div>

    <div class="footer-content">
        <div class="links-container">
            <a href="https://moerahome.com/about/" class="link-card">ABOUT US</a>
        </div>
    </div>

    <script>
        const countdownDate = new Date("April 14, 2026 00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = countdownDate - now;

            if (distance < 0) {
                document.getElementById("countdown").innerHTML = "<p style='color:white; font-weight:700;'>MOERA AÇILDI!</p>";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
